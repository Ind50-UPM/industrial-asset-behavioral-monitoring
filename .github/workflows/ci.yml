name: CI

on:
  push:
  pull_request:

jobs:
  test-and-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: abatilo/actions-poetry@v3
        with:
          poetry-version: "2.1.3"

      - name: Install Model_A dependencies
        working-directory: src/Model_A
        run: poetry install

      - name: Install Model_B dependencies
        working-directory: src/Model_B
        run: poetry install

      - name: Install Model_C dependencies
        working-directory: src/Model_C
        run: poetry install

      - name: Install furo package
        run: python -m pip install furo

      - name: Install documentation dependencies
        run: python -m pip install -r docs/requirements.txt

      - name: Run Model_A tests
        working-directory: src/Model_A
        run: poetry run pytest tests -q

      - name: Run Model_B tests
        working-directory: src/Model_B
        run: poetry run pytest tests -q

      - name: Run Model_C tests
        working-directory: src/Model_C
        run: poetry run pytest tests -q

      - name: Build Sphinx documentation
        env:
          PYTHONPATH: src/Model_A:src/Model_B:src/Model_C
        run: sphinx-build -b html docs docs/_build/html
